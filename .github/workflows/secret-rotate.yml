# ═══════════════════════════════════════════
# E2E_SECRET 자동 회전 — Sprint A D1 (2026-05-19)
# ═══════════════════════════════════════════
#
# 배경:
#   5/14·5/17·5/18 같은 root cause (E2E secret 노출 + 수동 회전 누락) 3회 재발.
#   참고: feedback_cf_e2e_secret_third_recurrence.md
#
# 동작:
#   1. CF Order 2 ("Allow irang E2E tests") expression에서 현재 secret 값 추출
#   2. 새 secret 생성 (openssl rand -hex 32)
#   3. CF API PUT으로 expression 갱신 (CF first)
#   4. PUT 후 GET 재검증 → 새 값 매칭 확인
#   5. GitHub Secret `E2E_SECRET` 갱신
#   6. 어느 단계든 실패 시 옛 값으로 CF rollback
#
# Atomic 보장 — CF first 선택 (D1 분석):
#   - CF 실패 시 GH 안 건드림 (옛 secret 모두 유효)
#   - CF 성공 후 GH 갱신 실패는 거의 없음 (gh CLI 인증만 통과하면)
#   - 만약 GH 갱신 실패 시 CF expression을 옛 값으로 rollback PUT
#
# 트리거 (D1):
#   - workflow_dispatch만 활성. on: push는 D2 회장 결재 후 활성화.
#
# 권한 요구사항:
#   - CF_API_TOKEN: Zone → Firewall Services → Edit (Custom Rule PUT)
#                   + Zone → Zone WAF → Edit (rulesets PUT)
#   - GITHUB_TOKEN: contents:read + 본 repo Actions의 secret write
#     주의: 기본 GITHUB_TOKEN은 secret write 권한 없음. 별도 GH_PAT_SECRETS 필요할 수 있음.
#     D1 dry-run에서 확인 후 D2 진입 전 결정.
#
# 결재 라인:
#   - D1 (오늘): draft + workflow_dispatch dry-run 1회 성공
#   - D2 (다음): on: push 활성화 + e2e regression
# ═══════════════════════════════════════════

name: "Rotate E2E secret"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true면 새 secret 생성·CF GET만 하고 PUT/GH 갱신 skip"
        required: false
        default: "true"
  # D2 결재 후 아래 활성:
  # push:
  #   branches: [main]

concurrency:
  group: secret-rotate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rotate:
    name: Rotate E2E_SECRET (CF first → GH)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      # GitHub Secret write용 PAT (필요 시 등록). 없으면 dry-run만 가능.
      GH_PAT_SECRETS: ${{ secrets.GH_PAT_SECRETS }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}

    steps:
      - name: Preflight — env check
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::error::CF_API_TOKEN / CF_ZONE_ID secret missing."
            exit 1
          fi
          echo "DRY_RUN=$DRY_RUN"

      - name: Step 1 — Find CF Order 2 ("Allow irang E2E tests") rule
        id: find_rule
        run: |
          # WAF Custom Rules ruleset 조회. http_request_firewall_custom phase.
          RULESETS=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/rulesets" \
            -H "Authorization: Bearer $CF_API_TOKEN")

          RULESET_ID=$(echo "$RULESETS" | jq -r '.result[] | select(.phase=="http_request_firewall_custom") | .id' | head -1)

          if [ -z "$RULESET_ID" ] || [ "$RULESET_ID" = "null" ]; then
            echo "::error::http_request_firewall_custom ruleset not found"
            echo "$RULESETS" | jq -r '.errors // [], .result | length'
            exit 1
          fi
          echo "ruleset_id=$RULESET_ID" >> $GITHUB_OUTPUT

          # 룰셋 상세 + 우리 룰(description 매칭)
          RULESET=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/rulesets/$RULESET_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN")

          RULE_ID=$(echo "$RULESET" | jq -r '.result.rules[] | select(.description | test("Allow irang E2E"; "i")) | .id' | head -1)

          if [ -z "$RULE_ID" ] || [ "$RULE_ID" = "null" ]; then
            echo "::error::Order 2 'Allow irang E2E tests' rule not found in ruleset $RULESET_ID"
            echo "Available rules:"
            echo "$RULESET" | jq -r '.result.rules[] | "\(.id) — \(.description)"'
            exit 1
          fi
          echo "rule_id=$RULE_ID" >> $GITHUB_OUTPUT

          # 현재 expression 보존 (rollback용)
          OLD_EXPRESSION=$(echo "$RULESET" | jq -r ".result.rules[] | select(.id==\"$RULE_ID\") | .expression")
          OLD_ACTION=$(echo "$RULESET" | jq -r ".result.rules[] | select(.id==\"$RULE_ID\") | .action")
          OLD_DESC=$(echo "$RULESET" | jq -r ".result.rules[] | select(.id==\"$RULE_ID\") | .description")

          # expression에서 현재 secret 추출 (x-irang-e2e-secret 헤더 매칭 부분)
          # 예시 expression: (... and http.request.headers["x-irang-e2e-secret"][0] eq "abc123...")
          OLD_SECRET=$(echo "$OLD_EXPRESSION" | grep -oE 'x-irang-e2e-secret"\]\[0\] eq "[a-f0-9]+"' | grep -oE '"[a-f0-9]+"' | tr -d '"' | head -1)

          if [ -z "$OLD_SECRET" ]; then
            echo "::error::Could not extract current secret from expression"
            echo "Expression: $OLD_EXPRESSION"
            exit 1
          fi

          # rollback 시 사용. 길이만 마스킹 출력
          echo "::add-mask::$OLD_SECRET"
          echo "old_secret_len=${#OLD_SECRET}" >> $GITHUB_OUTPUT
          # 다음 step으로 안전하게 넘기기 위해 파일로 (env에 노출 X)
          echo "$OLD_EXPRESSION" > /tmp/old_expression.txt
          echo "$OLD_SECRET" > /tmp/old_secret.txt
          echo "$OLD_ACTION" > /tmp/old_action.txt
          echo "$OLD_DESC" > /tmp/old_desc.txt
          chmod 600 /tmp/old_*.txt

          echo "Rule found: $RULE_ID (action=$OLD_ACTION, secret_len=${#OLD_SECRET})"

      - name: Step 2 — Generate new secret + new expression
        id: gen
        run: |
          NEW_SECRET=$(openssl rand -hex 32)
          echo "::add-mask::$NEW_SECRET"

          OLD_SECRET=$(cat /tmp/old_secret.txt)
          OLD_EXPRESSION=$(cat /tmp/old_expression.txt)

          # 옛 secret literal을 새 값으로 치환 (다른 hex 문자열은 건드리지 않게 정확히 quote 포함 매칭)
          NEW_EXPRESSION=$(echo "$OLD_EXPRESSION" | sed "s|\"$OLD_SECRET\"|\"$NEW_SECRET\"|g")

          # 검증: 정확히 1번만 치환됐는지
          OCCURRENCES_BEFORE=$(echo "$OLD_EXPRESSION" | grep -o "\"$OLD_SECRET\"" | wc -l | tr -d ' ')
          OCCURRENCES_AFTER=$(echo "$NEW_EXPRESSION" | grep -o "\"$NEW_SECRET\"" | wc -l | tr -d ' ')

          if [ "$OCCURRENCES_BEFORE" != "$OCCURRENCES_AFTER" ] || [ "$OCCURRENCES_BEFORE" = "0" ]; then
            echo "::error::Substitution mismatch (before=$OCCURRENCES_BEFORE after=$OCCURRENCES_AFTER)"
            exit 1
          fi

          # 새 expression에 옛 secret이 잔존하면 안 됨
          if echo "$NEW_EXPRESSION" | grep -q "$OLD_SECRET"; then
            echo "::error::Old secret leaked into new expression"
            exit 1
          fi

          echo "$NEW_SECRET" > /tmp/new_secret.txt
          echo "$NEW_EXPRESSION" > /tmp/new_expression.txt
          chmod 600 /tmp/new_*.txt
          echo "Generated new secret (len=${#NEW_SECRET}), substitutions=$OCCURRENCES_BEFORE"

      - name: Step 3 — CF PUT (atomic — CF first)
        id: cf_put
        if: env.DRY_RUN != 'true'
        run: |
          RULESET_ID="${{ steps.find_rule.outputs.ruleset_id }}"
          RULE_ID="${{ steps.find_rule.outputs.rule_id }}"
          NEW_EXPRESSION=$(cat /tmp/new_expression.txt)
          OLD_ACTION=$(cat /tmp/old_action.txt)
          OLD_DESC=$(cat /tmp/old_desc.txt)

          # 단일 룰 PATCH endpoint
          BODY=$(jq -nc \
            --arg expr "$NEW_EXPRESSION" \
            --arg act "$OLD_ACTION" \
            --arg desc "$OLD_DESC" \
            '{expression: $expr, action: $act, description: $desc}')

          RESPONSE=$(curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/rulesets/$RULESET_ID/rules/$RULE_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$BODY")

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::CF PATCH failed"
            echo "$RESPONSE" | jq -r '.errors // []'
            exit 1
          fi
          echo "CF PATCH success"

      - name: Step 4 — Verify CF GET shows new secret
        id: cf_verify
        if: env.DRY_RUN != 'true'
        run: |
          RULESET_ID="${{ steps.find_rule.outputs.ruleset_id }}"
          RULE_ID="${{ steps.find_rule.outputs.rule_id }}"
          NEW_SECRET=$(cat /tmp/new_secret.txt)
          OLD_SECRET=$(cat /tmp/old_secret.txt)

          # propagation 대기
          sleep 5

          RULESET=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/rulesets/$RULESET_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN")
          LIVE_EXPRESSION=$(echo "$RULESET" | jq -r ".result.rules[] | select(.id==\"$RULE_ID\") | .expression")

          if ! echo "$LIVE_EXPRESSION" | grep -q "\"$NEW_SECRET\""; then
            echo "::error::CF GET does not show new secret. Rolling back."
            exit 1
          fi

          if echo "$LIVE_EXPRESSION" | grep -q "$OLD_SECRET"; then
            echo "::error::Old secret still present in live expression. Rolling back."
            exit 1
          fi

          echo "CF expression verified — new secret active"

      - name: Step 5 — Update GitHub Secret E2E_SECRET
        id: gh_update
        if: env.DRY_RUN != 'true'
        run: |
          if [ -z "$GH_PAT_SECRETS" ]; then
            echo "::error::GH_PAT_SECRETS not configured. CF was updated but GH cannot be."
            echo "::error::Rolling back CF to old secret."
            exit 1
          fi

          NEW_SECRET=$(cat /tmp/new_secret.txt)
          # gh CLI 사용. GH_TOKEN env로 PAT 주입
          echo "$NEW_SECRET" | GH_TOKEN="$GH_PAT_SECRETS" gh secret set E2E_SECRET --repo ${{ github.repository }}
          echo "GitHub Secret E2E_SECRET updated"

      - name: Rollback — restore old CF expression on failure
        if: failure() && env.DRY_RUN != 'true' && steps.cf_put.outcome == 'success'
        run: |
          echo "::warning::Failure detected after CF PATCH. Restoring old expression."
          RULESET_ID="${{ steps.find_rule.outputs.ruleset_id }}"
          RULE_ID="${{ steps.find_rule.outputs.rule_id }}"
          OLD_EXPRESSION=$(cat /tmp/old_expression.txt)
          OLD_ACTION=$(cat /tmp/old_action.txt)
          OLD_DESC=$(cat /tmp/old_desc.txt)

          BODY=$(jq -nc \
            --arg expr "$OLD_EXPRESSION" \
            --arg act "$OLD_ACTION" \
            --arg desc "$OLD_DESC" \
            '{expression: $expr, action: $act, description: $desc}')

          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/rulesets/$RULESET_ID/rules/$RULE_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$BODY" | jq -r '.success // false'

          echo "::warning::Rollback PATCH submitted. Verify manually that CF Order 2 uses old secret."

      - name: Cleanup tmp files
        if: always()
        run: rm -f /tmp/old_*.txt /tmp/new_*.txt
