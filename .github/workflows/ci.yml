# ═══════════════════════════════════════════
# PR / main 푸시 시 품질 게이트
# - ESLint 린트
# - TypeScript 타입 체크
# - Next.js 빌드 검증
# - 데이터 신선도 점검 (경고만, PR 블록 안 함)
# ═══════════════════════════════════════════

name: "CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  quality-gate:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: "ESLint: errors (must pass)"
        run: npx eslint --quiet

      - name: "ESLint: warnings (report only)"
        run: npx eslint
        continue-on-error: true

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: "데이터 무결성 — regions ↔ stations 양방향 sync"
        # 5/12 세종/울산 누락 재발 방지. province.representativeStationId 가
        # STATIONS 에 없으면 buildRegionItem null → 모든 view 에서 region 삭제.
        run: npx tsx scripts/check-regions-stations-integrity.ts

      - name: "데이터 무결성 — cross-reference (PROVINCES.name SSOT)"
        # 5/22 D1 진단 sprint 후 자동화. PROVINCES.name(구표기)·CROPS·SIGUNGUS
        # 4종 cross-reference (작물·지원사업·인터뷰·페르소나) 차원에서 정합.
        # 강원/전북 신·구표기 불일치 → 작물 추천 누락 등 재발 방지.
        run: npx tsx scripts/check-cross-reference.ts

      - name: "데이터 무결성 — searchParams 화이트리스트 정합"
        # list 페이지 새 searchParam 키(view·page·sort)나 sort enum 값을 추가하면서
        # src/lib/search-params/normalize.ts 화이트리스트 갱신을 누락하면 middleware가
        # 라이브에서 308 strip → deep link 무력화. 로컬 build·test는 통과하고 라이브에서만
        # 발견되는 silent 사고 (5/29 view·5/30 page·6/16 sort=income 3회 재발). page.tsx
        # searchParams 타입 + *_SORT_OPTIONS 상수를 소스 오브 트루스로 대조.
        run: npx tsx scripts/check-searchparams-whitelist.ts

      - name: "SEO 회귀 — useSearchParams Suspense bailout 정적 검사"
        # 6/1 사고 재발 차단: 정적 렌더 서버 page가 useSearchParams-전파 컴포넌트를
        # Suspense 없이 렌더하면 static generation 시 CSR bailout이 페이지 루트까지
        # 전파 → 히어로 h1·본문이 SSR HTML에서 통째로 누락 → 크롤러 색인 불가.
        # import 그래프 + JSX Suspense-깊이 파싱으로 탐지. 동적 페이지(searchParams
        # 소비·force-dynamic)는 요청 시 서버 렌더되므로 무해로 면제.
        run: npx tsx scripts/check-suspense-bailout.ts

      - name: "데이터 무결성 — compute 산출물 재현성"
        # dimension-scores·settlement-score.ts는 compute 스크립트가 정적 데이터만
        # 입력으로 결정적으로 생성하는 산출물. 입력 갱신 후 재계산 누락이나 산출물
        # 수동 편집으로 "커밋본 ≠ 스크립트 산출물" drift가 생기면, 재실행 시 카피·수치가
        # 조용히 회귀한다 (5/19 "귀농"→"정착" sed가 산출물만 바꾼 사례). 스크립트를
        # IRANG_COMPUTE_OUT tmp로 재실행해 커밋본과 byte 대조(날짜 라인 정규화).
        run: npx tsx scripts/check-compute-reproducibility.ts

      - name: "데이터 무결성 — 지원사업 중복 점검"
        # 5/11 SP-019 ≡ SP-012 중복 사고(회장 라이브 발견) 후 자동화된 셀프 점검을 CI 게이팅.
        # DUPLICATE(허용쌍 제외) 발견 시 build 차단. KNOWN_DISTINCT_PAIRS 허용쌍은
        # ALLOWLISTED skip 로그만 남기고 게이팅 제외 (SP-030↔031 = 농촌돌봄 별개 트랙,
        # 7/7·7/9 검증 완료). SIMILAR는 STRICT=1에서만 실패 — 기본은 리포트만.
        run: npx tsx scripts/check-program-dup.ts --all --ci

      - name: "마이그레이션 — 신규 컬럼 NOT NULL 점검"
        # 5/26 quick_feedback 33일 silent fail 사고 영구 차단 (CLAUDE.md Lessons
        # Learned 2026-05-26). 5/15·5/16 마이그레이션이 신규 컬럼(thumbs·request_kind)
        # 추가 시 기존 rating·message NOT NULL DROP을 누락 → 23502 → silent 202 →
        # 33일 INSERT 0건. 동반 조치 4종(DROP NOT NULL · CHECK 안전망 · SET DEFAULT
        # · ack 코멘트) 중 1개 이상 강제. 5/15·5/16 grandfather 처리됨.
        run: npx tsx scripts/check-migration-not-null.ts

      - name: Next.js build
        run: npm run build
        env:
          # 빌드 시 외부 API 키 없이도 정적 폴백으로 성공해야 함
          NEXT_TELEMETRY_DISABLED: 1

      - name: 데이터 신선도 점검 (경고만)
        # 상태 불일치가 있어도 PR을 블록하지 않고 경고 로그만 출력
        run: npx tsx scripts/check-data-freshness.ts
        continue-on-error: true
