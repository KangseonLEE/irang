name: E2E critical paths

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "테스트할 baseURL (기본: https://irangfarm.com)"
        required: false
        default: "https://irangfarm.com"

# 동일 ref에서 중복 실행 방지 (push가 연이어 들어오는 경우)
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium desktop + mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # workflow_dispatch input이 우선, 그 외에는 prod
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://irangfarm.com' }}
      # CF Order 2 Skip 룰의 이중 검증용 secret (UA + Secret).
      # GitHub Secrets에 E2E_SECRET 등록 필수 (5/16 봇 UA 위장 대응).
      E2E_SECRET: ${{ secrets.E2E_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deploy to propagate (only on push/PR)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        # Vercel 자동 배포(보통 60~120s) + CF purge workflow 완료 대기. 안전 마진 150s.
        run: sleep 150

      - name: Run Playwright tests
        run: npx playwright test

      # 5/17 보안 사고 fix: Playwright trace.zip + report 에 x-irang-e2e-secret
      # 헤더 평문 포함 + public repo artifact 다운로드 가능 → token 유출 → 봇 우회.
      # CF Order 2 24h 9.89k events (정상 CI 100건 미만 대비 99배 이상).
      # → trace artifact 업로드 영구 비활성화. debug 필요 시 회장이 workflow_dispatch
      #   `dispatch_with_trace: true` input으로 일시적으로 활성화 (별도 PR 필요).
