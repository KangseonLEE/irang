# ═══════════════════════════════════════════
# Cloudflare cache auto-purge on Vercel deploy
# - main 브랜치 push → Vercel 자동 배포
# - Vercel이 GitHub Deployments API에 success 상태 등록 → deployment_status 이벤트 발화
# - 본 workflow가 그 이벤트에 trigger되어 즉시 Cloudflare 전체 캐시 purge
# - 회장 수동 purge 영구 0회 보장 (2026-05-11)
# ═══════════════════════════════════════════
#
# 결재 필요 (1회):
# 1) Cloudflare Dashboard → My Profile → API Tokens → Create Token
#    - Custom token
#    - Permissions: Zone → Cache Purge → Purge
#    - Zone Resources: Include → Specific zone → irangfarm.com
# 2) GitHub Secrets 등록 (Settings → Secrets and variables → Actions)
#    - CF_API_TOKEN: 위 토큰
#    - CF_ZONE_ID: Cloudflare → irangfarm.com → Overview 우측 Zone ID
# ═══════════════════════════════════════════
#
# 변경 이력:
# - 2026-05-11: 자동화 시작 (push trigger + Vercel deploy polling)
# - 2026-05-16: deployment_status trigger로 전환 (root cause fix).
#   기존 push trigger + polling 방식은 commit 다발 시 Vercel queue 부하로 15분+ 걸리는
#   사례 다발(0467e54·1da1fe9·b25fd03 연속 fail). deployment_status는 Vercel이 success
#   등록하는 시점에 자동 발화 → Wait 단계 자체가 불필요.
# ═══════════════════════════════════════════

name: "Cloudflare cache purge"

on:
  deployment_status:
  workflow_dispatch: # 긴급 수동 트리거 (기존 main HEAD에 대한 강제 purge)

concurrency:
  group: cf-purge-${{ github.ref }}
  cancel-in-progress: false # purge는 직렬 처리 (race 방지)

permissions:
  contents: read

jobs:
  purge:
    name: Cloudflare purge
    runs-on: ubuntu-latest
    timeout-minutes: 3

    # Production 환경 + success 상태만 trigger.
    # workflow_dispatch는 무조건 trigger.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')

    steps:
      - name: Purge Cloudflare cache (purge_everything)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF_API_TOKEN or CF_ZONE_ID secret missing. Skipping."
            echo "See .github/workflows/cf-purge.yml header for setup instructions."
            exit 0
          fi

          # deployment_status 이벤트 컨텍스트 로그 (디버깅용)
          if [ "${{ github.event_name }}" = "deployment_status" ]; then
            echo "Triggered by Vercel deployment success:"
            echo "  environment: ${{ github.event.deployment.environment }}"
            echo "  sha: ${{ github.event.deployment.sha }}"
            echo "  description: ${{ github.event.deployment_status.description }}"
          fi

          RESPONSE=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          echo "Cloudflare response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            echo "Cloudflare purge FAILED."
            echo "$RESPONSE" | jq -r '.errors // []'
            exit 1
          fi

          echo "Cloudflare cache purged successfully."
