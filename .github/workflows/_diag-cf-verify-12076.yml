# EPHEMERAL — verify only. Delete after use.
name: "_diag CF verify ASN 12076 (verify only)"
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Query CF security events for ASN 12076
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          set -e
          SINCE=$(date -u -d '-30 minutes' +%Y-%m-%dT%H:%M:%SZ)
          UNTIL=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "window: $SINCE → $UNTIL"

          # GraphQL: ASN=12076 block events (last 30min) — clientAsn must be string
          GQL=$(jq -n --arg zone "$CF_ZONE_ID" --arg since "$SINCE" --arg until "$UNTIL" '{
            query: "query($zone:String!,$since:Time!,$until:Time!){viewer{zones(filter:{zoneTag:$zone}){firewallEventsAdaptiveGroups(limit:50,filter:{datetime_geq:$since,datetime_leq:$until,clientAsn:\"12076\",action:\"block\"}){count,dimensions{action,source,ruleId}}}}}",
            variables: {zone:$zone, since:$since, until:$until}
          }')
          EVENTS=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/graphql" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$GQL")
          echo "=== ASN=12076 block events ==="
          echo "$EVENTS" | jq '.'
          BLOCK_COUNT=$(echo "$EVENTS" | jq -r '[.data.viewer.zones[0].firewallEventsAdaptiveGroups[]?.count] | add // 0')
          echo "ASN=12076 block events (last 30min): $BLOCK_COUNT"

          # Top 10 US ASNs (all traffic) — for next round
          GQL2=$(jq -n --arg zone "$CF_ZONE_ID" --arg since "$SINCE" --arg until "$UNTIL" '{
            query: "query($zone:String!,$since:Time!,$until:Time!){viewer{zones(filter:{zoneTag:$zone}){httpRequestsAdaptiveGroups(limit:10,filter:{datetime_geq:$since,datetime_leq:$until,clientCountryName:\"US\"},orderBy:[count_DESC]){count,dimensions{clientAsn,clientASNDescription}}}}}",
            variables: {zone:$zone, since:$since, until:$until}
          }')
          TOP=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/graphql" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$GQL2")
          echo "=== Top 10 US ASNs (all traffic, last 30min) ==="
          echo "$TOP" | jq '.data.viewer.zones[0].httpRequestsAdaptiveGroups // .errors'

          # Confirm current rule expression still has 12076
          RULES=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/firewall/rules" \
            -H "Authorization: Bearer $CF_API_TOKEN")
          EXPR=$(echo "$RULES" | jq -r '.result[] | select(.filter.expression | test("ip\\.geoip\\.asnum in")) | .filter.expression')
          echo "=== current Order 3 expression ==="
          echo "$EXPR"
          if echo "$EXPR" | grep -q "12076"; then
            echo "12076 persistence: CONFIRMED in live rule"
          else
            echo "::error::12076 missing from live rule"
          fi

          echo ""
          echo "════════════════════════════════════════"
          echo "VERIFY SUMMARY"
          echo "════════════════════════════════════════"
          echo "ASN=12076 block events (30min window): $BLOCK_COUNT"
          if [ "$BLOCK_COUNT" -gt 0 ]; then
            echo "HIT — block 적중 확정"
          else
            echo "MISS — 차단 후 트래픽 자연 감소했거나 다른 ASN 우회"
          fi
