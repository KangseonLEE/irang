# EPHEMERAL DIAGNOSTIC WORKFLOW — DELETE AFTER USE
# 2026-05-18: Order 3 ASN block rule에 12076 (Flint Hill) 추가
# 1) read: 토큰 권한 검증 + 현재 Order 3 rule_id/expression 조회
# 2) write: expression update (ASN 12076 추가)
# 3) verify: 5분 대기 후 CF Security Events에서 ASN=12076 block 카운트 조회
name: "_diag CF ASN 12076 (one-shot)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run diagnostic
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          set -e
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::error::CF_API_TOKEN or CF_ZONE_ID missing"
            exit 1
          fi

          echo "════════════════════════════════════════"
          echo "STEP 1: read-only — list firewall rules"
          echo "════════════════════════════════════════"
          RULES=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/firewall/rules" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")

          SUCCESS=$(echo "$RULES" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::read failed (token permission missing?)"
            echo "$RULES" | jq -r '.errors // []'
            exit 1
          fi
          echo "read OK"

          # ASN block 매칭 룰 찾기 (expression에 'ip.geoip.asnum in' 포함)
          ORDER3=$(echo "$RULES" | jq -c '.result[] | select(.filter.expression | test("ip\\.geoip\\.asnum in"))')
          if [ -z "$ORDER3" ]; then
            echo "::error::ASN block rule not found"
            echo "$RULES" | jq -r '.result[] | {id, description, expression: .filter.expression}'
            exit 1
          fi

          RULE_ID=$(echo "$ORDER3" | jq -r '.id')
          FILTER_ID=$(echo "$ORDER3" | jq -r '.filter.id')
          OLD_EXPR=$(echo "$ORDER3" | jq -r '.filter.expression')
          DESC=$(echo "$ORDER3" | jq -r '.description // ""')
          ACTION=$(echo "$ORDER3" | jq -r '.action')
          PAUSED=$(echo "$ORDER3" | jq -r '.paused')

          echo "rule_id:   $RULE_ID"
          echo "filter_id: $FILTER_ID"
          echo "desc:      $DESC"
          echo "action:    $ACTION"
          echo "paused:    $PAUSED"
          echo "old_expr:  $OLD_EXPR"

          if echo "$OLD_EXPR" | grep -q "12076"; then
            echo "::warning::ASN 12076 already in expression. Skipping write."
            exit 0
          fi

          # ASN set에 12076 추가. 기존 패턴: {14618 16509 8075 15169 14061 396982}
          NEW_EXPR=$(echo "$OLD_EXPR" | sed -E 's/(ip\.geoip\.asnum in \{[^}]+)\}/\1 12076}/')
          if [ "$NEW_EXPR" = "$OLD_EXPR" ]; then
            echo "::error::expression replace failed (pattern not matched)"
            exit 1
          fi
          echo "new_expr:  $NEW_EXPR"

          echo ""
          echo "════════════════════════════════════════"
          echo "STEP 2: write — update filter expression"
          echo "════════════════════════════════════════"
          # CF Firewall Rules: filter expression update via /filters/{filter_id}
          PAYLOAD=$(jq -n --arg id "$FILTER_ID" --arg expr "$NEW_EXPR" \
            '{id: $id, expression: $expr, paused: false}')
          UPDATE=$(curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/filters/$FILTER_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          USUC=$(echo "$UPDATE" | jq -r '.success // false')
          if [ "$USUC" != "true" ]; then
            echo "::error::write failed"
            echo "$UPDATE" | jq -r '.errors // []'
            exit 1
          fi
          echo "write OK"
          echo "$UPDATE" | jq -r '.result | {id, expression}'

          echo ""
          echo "════════════════════════════════════════"
          echo "STEP 3: verify — wait 5 min then query CF Security Events"
          echo "════════════════════════════════════════"
          echo "sleeping 300s..."
          sleep 300

          # GraphQL Analytics: firewall events with ASN filter
          SINCE=$(date -u -d '-15 minutes' +%Y-%m-%dT%H:%M:%SZ)
          UNTIL=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GQL=$(jq -n --arg zone "$CF_ZONE_ID" --arg since "$SINCE" --arg until "$UNTIL" '{
            query: "query($zone:String!,$since:Time!,$until:Time!){viewer{zones(filter:{zoneTag:$zone}){firewallEventsAdaptiveGroups(limit:50,filter:{datetime_geq:$since,datetime_leq:$until,clientAsn:12076,action:\"block\"}){count}}}}",
            variables: {zone:$zone, since:$since, until:$until}
          }')
          EVENTS=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/graphql" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$GQL")
          echo "events response:"
          echo "$EVENTS" | jq '.'

          BLOCK_COUNT=$(echo "$EVENTS" | jq -r '[.data.viewer.zones[0].firewallEventsAdaptiveGroups[].count] | add // 0')
          echo "ASN=12076 block events (last 15min): $BLOCK_COUNT"

          # Top 5 US-non-blocked ASNs for next round
          GQL2=$(jq -n --arg zone "$CF_ZONE_ID" --arg since "$SINCE" --arg until "$UNTIL" '{
            query: "query($zone:String!,$since:Time!,$until:Time!){viewer{zones(filter:{zoneTag:$zone}){httpRequestsAdaptiveGroups(limit:10,filter:{datetime_geq:$since,datetime_leq:$until,clientCountryName:\"US\"},orderBy:[count_DESC]){count,dimensions{clientAsn,clientASNDescription}}}}}",
            variables: {zone:$zone, since:$since, until:$until}
          }')
          TOP=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/graphql" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$GQL2")
          echo ""
          echo "Top US ASNs (last 15min, all traffic):"
          echo "$TOP" | jq '.data.viewer.zones[0].httpRequestsAdaptiveGroups // []'

          echo ""
          echo "════════════════════════════════════════"
          echo "CoS HANDOFF SUMMARY"
          echo "════════════════════════════════════════"
          echo "diff: ASN set { ... } → { ... 12076 }"
          echo "before: $OLD_EXPR"
          echo "after:  $NEW_EXPR"
          echo "apply result: 200 OK"
          echo "verify: ASN=12076 block events (last 15min) = $BLOCK_COUNT"
          if [ "$BLOCK_COUNT" -gt 0 ]; then
            echo "HIT — 차단 적중 확정"
          else
            echo "MISS — 차단 후 트래픽 자연 감소했거나 다른 ASN으로 우회. Top US ASN 위 목록 참조"
          fi
