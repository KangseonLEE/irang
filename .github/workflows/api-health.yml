# ═══════════════════════════════════════════
# 매일 외부 API 헬스체크
# - 매일 KST 오전 8시 (UTC 23:00 전날) 자동 실행
# - 9개 외부 API 엔드포인트 응답 가능 여부 확인
# - 응답 시간(ms) + HTTP 상태코드 기록
# - 500 오류/타임아웃 2개 이상이면 GitHub Issue 자동 생성
# - 수동 실행 가능 (Actions 탭 → Run workflow)
# ═══════════════════════════════════════════

name: "🩺 외부 API 헬스체크"

on:
  schedule:
    # 매일 KST 오전 8시 (UTC 23:00 전날)
    - cron: "0 23 * * *"
  workflow_dispatch: # 수동 실행 지원

permissions:
  issues: write
  contents: read

jobs:
  api-health:
    name: 외부 API 헬스체크
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: api-health 라벨 생성 (없으면)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "api-health" \
            --description "외부 API 헬스체크 자동 이슈" \
            --color "e4e669" \
            2>/dev/null || true

      - name: API 헬스체크 실행
        id: health
        env:
          DATA_GO_KR_API_KEY:  ${{ secrets.DATA_GO_KR_API_KEY }}
          KOSIS_API_KEY:       ${{ secrets.KOSIS_API_KEY }}
          NEIS_API_KEY:        ${{ secrets.NEIS_API_KEY }}
          RDA_API_KEY:         ${{ secrets.RDA_API_KEY }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          TIMEOUT=10
          FAIL_COUNT=0
          RESULT_TABLE="| API | 엔드포인트 | 상태 | 응답시간 | 비고 |\n|-----|----------|------|---------|------|\n"

          # ── 헬퍼: curl 실행 후 결과 파싱 ──────────────────────────────
          check_api() {
            local name="$1"
            local url="$2"
            local extra_headers="$3"

            START=$(date +%s%3N)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time "$TIMEOUT" \
              ${extra_headers:+-H "$extra_headers"} \
              "$url" 2>/dev/null || echo "000")
            END=$(date +%s%3N)
            ELAPSED=$(( END - START ))

            if [ "$HTTP_CODE" = "000" ]; then
              STATUS="⏱️ 타임아웃"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            elif [ "$HTTP_CODE" -ge 500 ] 2>/dev/null; then
              STATUS="❌ ${HTTP_CODE}"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            elif [ "$HTTP_CODE" -ge 400 ] 2>/dev/null; then
              # 400번대는 키 인증 실패로 볼 수 있으나 서버는 살아있음
              STATUS="⚠️ ${HTTP_CODE}"
            else
              STATUS="✅ ${HTTP_CODE}"
            fi

            SHORT_URL=$(echo "$url" | cut -c1-60)
            RESULT_TABLE="${RESULT_TABLE}| ${name} | \`${SHORT_URL}\` | ${STATUS} | ${ELAPSED}ms | |\n"
            echo "[${STATUS}] ${name} — ${HTTP_CODE} (${ELAPSED}ms)"
          }

          # ── 1. 기상청 (data.go.kr) ──────────────────────────────────
          check_api "기상청" \
            "https://apis.data.go.kr/1360000/AsosDalyInfoService/getWthrDataList?serviceKey=${DATA_GO_KR_API_KEY:-MISSING}&numOfRows=1&pageNo=1&dataType=JSON&dataCd=ASOS&dateCd=DAY&startDt=20240101&endDt=20240101&stnIds=108"

          # ── 2. SGIS (통계청 공간정보) — 토큰 발급 엔드포인트 가용성 확인
          check_api "SGIS" \
            "https://sgisapi.kostat.go.kr/OpenAPI3/auth/authentication.json?consumer_key=test&consumer_secret=test"

          # ── 3. KOSIS (통계청) ───────────────────────────────────────
          check_api "KOSIS" \
            "https://kosis.kr/openapi/Param/statisticsParameterData.do?method=getList&apiKey=${KOSIS_API_KEY:-MISSING}&itmId=T10+&objL1=ALL&objL2=&objL3=&objL4=&objL5=&objL6=&objL7=&objL8=&format=json&jsonVD=Y&userStatsId=prhee01%2FKOSIS_COMMON%2FdefaultLayout&stt_id=101&stt_subject_id=&listId=101_DT_1BPA002&startPrdDe=2023&endPrdDe=2023"

          # ── 4. HIRA (심평원) — data.go.kr 공통 키 사용 ──────────────
          check_api "HIRA" \
            "https://apis.data.go.kr/B551182/MdlrtHospInfoService/getMdlrtHospList?serviceKey=${DATA_GO_KR_API_KEY:-MISSING}&pageNo=1&numOfRows=1&clCd=11"

          # ── 5. NEIS (교육부) ────────────────────────────────────────
          check_api "NEIS" \
            "https://open.neis.go.kr/hub/schulInfo?KEY=${NEIS_API_KEY:-MISSING}&Type=json&pIndex=1&pSize=1&SCHUL_KND_SC_NM=초등학교"

          # ── 6. RDA (농진청 농사로) ──────────────────────────────────
          check_api "RDA" \
            "https://api.nongsaro.go.kr/service/cropPrductCd/cropPrductCdList?apiKey=${RDA_API_KEY:-MISSING}&numOfRows=1&pageNo=1"

          # ── 7. 네이버 검색 API ──────────────────────────────────────
          check_api "네이버" \
            "https://openapi.naver.com/v1/search/news.json?query=귀농&display=1" \
            "X-Naver-Client-Id: ${NAVER_CLIENT_ID:-MISSING}"

          # ── 8. Unsplash ─────────────────────────────────────────────
          check_api "Unsplash" \
            "https://api.unsplash.com/photos/random?query=farm&client_id=${UNSPLASH_ACCESS_KEY:-MISSING}"

          # ── 9. Supabase ─────────────────────────────────────────────
          if [ -n "$SUPABASE_URL" ]; then
            check_api "Supabase" \
              "${SUPABASE_URL}/rest/v1/"
          else
            RESULT_TABLE="${RESULT_TABLE}| Supabase | — | ⚠️ URL 없음 | — | SUPABASE_URL 미설정 |\n"
            echo "[⚠️] Supabase — URL 미설정"
          fi

          # ── 결과 저장 ───────────────────────────────────────────────
          echo "fail_count=${FAIL_COUNT}" >> "$GITHUB_OUTPUT"
          # 개행 문자를 포함한 테이블을 GITHUB_OUTPUT에 저장 (multiline)
          {
            echo 'result_table<<EOF'
            printf "%b" "$RESULT_TABLE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "── 요약: 총 실패 ${FAIL_COUNT}건 (500 오류 + 타임아웃) ──"

      - name: 열린 api-health 이슈 확인
        id: existing_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list \
            --label "api-health" \
            --state open \
            --json number \
            --jq length)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: GitHub Issue 생성 (실패 2개 이상 + 열린 이슈 없을 때)
        if: steps.health.outputs.fail_count >= 2 && steps.existing_issue.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAIL_COUNT="${{ steps.health.outputs.fail_count }}"
          TODAY=$(date -u '+%Y-%m-%d')

          gh issue create \
            --title "🩺 외부 API 장애 감지 — ${FAIL_COUNT}개 실패 (${TODAY})" \
            --label "api-health" \
            --body "## 외부 API 헬스체크 결과

          **${FAIL_COUNT}개** API가 500 오류 또는 타임아웃(10초)을 반환했어요.

          ### 점검 결과

          ${{ steps.health.outputs.result_table }}

          ### 조치 방법

          - [ ] 위 테이블에서 ❌/⏱️ 항목 확인
          - [ ] 해당 API 공급자 공지사항·상태 페이지 확인
          - [ ] 일시 장애라면 다음 날 자동 재확인
          - [ ] 지속 장애라면 폴백 데이터 최신화 검토

          ### 관련 파일

          - \`src/lib/api/\` (각 API 연동 모듈)
          - \`src/lib/data/\` (정적 폴백 데이터)

          > 🤖 이 Issue는 GitHub Actions에 의해 자동 생성되었습니다."
